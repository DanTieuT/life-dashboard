[build]
  base = "dashboard-project 10"
  publish = "."
  functions = "netlify/functions"

[dev]
  publish = "."
  port = 8888

[functions."sync-timetree"]
  schedule = "*/5 * * * *"

# 9pm PST Sunday = 05:00 UTC Monday (Netlify cron is UTC, no DST handling)
[functions."weekly-review"]
  schedule = "0 5 * * 1"

# 8pm PST daily = 03:00 UTC next day (Netlify cron is UTC, no DST handling —
# during PDT this fires at 8pm PT; during PST it's 7pm. Close enough for a nudge.)
[functions."habit-reminder"]
  schedule = "0 3 * * *"

# 6pm PST daily = 02:00 UTC next day (same DST caveat as above). Only actually
# sends a message when tomorrow is an RDO day — see rdo-nudge.js.
[functions."rdo-nudge"]
  schedule = "0 2 * * *"

# Shipping: scan Gmail label for new tracking numbers every 30 min;
# poll 17TRACK for status changes every 2 hours. Both no-op until their
# API keys are configured (GMAIL_* / TRACK17_API_KEY).
[functions."gmail-scan"]
  schedule = "*/30 * * * *"

[functions."shipping-sync"]
  schedule = "0 */2 * * *"
